name: Validate gstack-ghcp

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure scripts are executable
        run: chmod +x scripts/*.sh

      - name: Check shell script syntax
        run: bash -n scripts/*.sh

      - name: Validate Copilot conversion structure
        run: ./scripts/validate-ghcp.sh

      - name: Run QA score
        run: ./scripts/qa-score.sh .

      - name: Run QA workflow smoke
        run: ./scripts/qa-workflow.sh .

      - name: Run office-hours workflow smoke
        run: ./scripts/office-hours-workflow.sh --idea "daily briefing app" --audience "busy founders"

      - name: Run autoplan workflow smoke
        run: ./scripts/autoplan-workflow.sh --idea "daily briefing app" --target .

      - name: Run spec workflow smoke
        run: |
          cat > /tmp/gstack-ghcp-spec.md <<'SPEC'
          # Email login

          ## Summary
          사용자가 이메일과 비밀번호로 로그인할 수 있게 합니다.

          ## Scope
          - 포함: 로그인 요청, 성공/실패 응답, 기본 오류 메시지
          - 제외: OAuth, 2FA, 비밀번호 재설정

          ## User Stories
          - As a user, I want to log in with email, so that I can access my account.

          ## Technical Requirements
          - 로그인 요청을 처리하는 서버 엔드포인트가 필요합니다.

          ## Acceptance Criteria
          - Given 등록된 사용자, When 올바른 이메일과 비밀번호를 입력하면, Then 로그인에 성공합니다.
          SPEC
          ./scripts/spec-workflow.sh --title "Email login" --body /tmp/gstack-ghcp-spec.md --label feature

      - name: Run review workflow smoke
        run: ./scripts/review-workflow.sh --base HEAD --target HEAD

      - name: Run review GitHub context preview smoke
        run: ./scripts/review-workflow.sh --base HEAD --target HEAD --pr 123 --issue 42

      - name: Run investigate workflow smoke
        run: ./scripts/investigate-workflow.sh --symptom "workflow smoke test" --target .

      - name: Run ship workflow smoke
        run: ./scripts/ship-workflow.sh --pr 123 --issue 42

      - name: Run memory workflow smoke
        run: ./scripts/memory-workflow.sh save --type pattern --title "gh approval" --note "Show gh mutation commands before running."